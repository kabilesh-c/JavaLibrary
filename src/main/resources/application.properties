# Supabase PostgreSQL Database Configuration
# Replace the placeholders with your actual Supabase connection details
# Get these from Supabase Dashboard > Settings > Database > Connection string

spring.datasource.url=jdbc:postgresql://<SUPABASE_HOST>:5432/<DB_NAME>
spring.datasource.username=<DB_USERNAME>
spring.datasource.password=<DB_PASSWORD>

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Connection Pool Settings (optional, for better performance)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# Server Configuration
server.port=8080

# Thymeleaf Configuration
spring.thymeleaf.cache=false

# Simple Admin Credentials (for demo only - not production-ready)
# Change these values for your deployment
app.admin.username=admin
app.admin.password=admin123

# Logging Configuration
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=INFO
logging.level.com.example.library=DEBUG

# Application Name
spring.application.name=Library Management System
