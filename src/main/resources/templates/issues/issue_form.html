<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Issue Book - Library Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/dashboard">
                <i class="bi bi-book"></i> Library Management
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/books">Books</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/students">Students</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/issues/new">Issue Book</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/issues/history">History</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/logout">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-warning text-dark">
                        <h4 class="mb-0"><i class="bi bi-arrow-up-circle"></i> Issue Book</h4>
                    </div>
                    <div class="card-body">
                        <!-- Success/Error Messages -->
                        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
                            <i class="bi bi-check-circle"></i> <span th:text="${message}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                            <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>

                        <form th:action="@{/issues/issue}" method="post">
                            <div class="mb-3">
                                <label for="bookId" class="form-label">Select Book <span class="text-danger">*</span></label>
                                <select class="form-select" id="bookId" name="bookId" required>
                                    <option value="">-- Choose a book --</option>
                                    <option th:each="book : ${books}" 
                                            th:value="${book.id}" 
                                            th:text="${book.title + ' by ' + book.author + ' (Available: ' + book.availableCopies + ')'}">
                                        Book Title
                                    </option>
                                </select>
                                <small class="text-muted">Only books with available copies are shown</small>
                            </div>

                            <div class="mb-3">
                                <label for="studentId" class="form-label">Select Student <span class="text-danger">*</span></label>
                                <select class="form-select" id="studentId" name="studentId" required>
                                    <option value="">-- Choose a student --</option>
                                    <option th:each="student : ${students}" 
                                            th:value="${student.id}" 
                                            th:text="${student.name + ' (' + student.roll + ')'}">
                                        Student Name
                                    </option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label for="dueDate" class="form-label">Due Date <span class="text-danger">*</span></label>
                                <input type="date" class="form-control" id="dueDate" name="dueDate" 
                                       th:value="${defaultDueDate}" required>
                                <small class="text-muted">Default: 14 days from today</small>
                            </div>

                            <div class="alert alert-info">
                                <i class="bi bi-info-circle"></i> <strong>Note:</strong> Late return fine is ₹10 per day after the due date.
                            </div>

                            <div class="d-flex justify-content-between mt-4">
                                <a href="/issues/history" class="btn btn-secondary">
                                    <i class="bi bi-arrow-left"></i> Cancel
                                </a>
                                <button type="submit" class="btn btn-warning">
                                    <i class="bi bi-check-circle"></i> Issue Book
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Quick Stats -->
                <div class="card mt-4">
                    <div class="card-body">
                        <h6>Quick Stats</h6>
                        <div class="row text-center">
                            <div class="col-md-6">
                                <h4 th:text="${#lists.size(books)}">0</h4>
                                <small class="text-muted">Available Books</small>
                            </div>
                            <div class="col-md-6">
                                <h4 th:text="${#lists.size(students)}">0</h4>
                                <small class="text-muted">Total Students</small>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
